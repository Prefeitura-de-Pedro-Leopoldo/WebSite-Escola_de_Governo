<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ebf5fb" />
      <stop offset="100%" stop-color="#f4f9fd" />
    </linearGradient>
    <!-- Person colors -->
    <linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5c" />
      <stop offset="100%" stop-color="#2b6cb0" />
    </linearGradient>
    <linearGradient id="p2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b6cb0" />
      <stop offset="100%" stop-color="#3182ce" />
    </linearGradient>
    <linearGradient id="p3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3182ce" />
      <stop offset="100%" stop-color="#63b3ed" />
    </linearGradient>
    <linearGradient id="p4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a5276" />
      <stop offset="100%" stop-color="#2980b9" />
    </linearGradient>
    <linearGradient id="p5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#154360" />
      <stop offset="100%" stop-color="#1e3a5c" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a017" />
      <stop offset="100%" stop-color="#f0c040" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="150" cy="150" r="140" fill="url(#bgGrad)" />
  <circle cx="150" cy="150" r="140" fill="none" stroke="#e0ecf5" stroke-width="1" />

  <!-- Decorative ring -->
  <circle cx="150" cy="150" r="105" fill="none" stroke="#d6e8f5" stroke-width="0.5" stroke-dasharray="4 6" />

  <!-- Small accent stars -->
  <polygon points="150,32 153,40 161,40 155,45 157,53 150,49 143,53 145,45 139,40 147,40" fill="url(#accent)" opacity="0.9" />
  <polygon points="82,68 84,73 89,73 85,76 87,81 82,78 77,81 79,76 75,73 80,73" fill="url(#accent)" opacity="0.6" />
  <polygon points="218,68 220,73 225,73 221,76 223,81 218,78 213,81 215,76 211,73 216,73" fill="url(#accent)" opacity="0.6" />
  <polygon points="60,160 62,165 67,165 63,168 65,173 60,170 55,173 57,168 53,165 58,165" fill="url(#accent)" opacity="0.5" />
  <polygon points="240,160 242,165 247,165 243,168 245,173 240,170 235,173 237,168 233,165 238,165" fill="url(#accent)" opacity="0.5" />

  <!-- Person 1 - Top (pointing up) -->
  <g>
    <!-- Head -->
    <circle cx="150" cy="72" r="14" fill="url(#p1)" />
    <!-- Body - arm-like shape reaching toward center -->
    <path d="M150,86 L138,110 L144,115 L150,100 L156,115 L162,110 Z" fill="url(#p1)" />
    <!-- Arms spread -->
    <path d="M138,110 L125,100 L128,94 L144,108 Z" fill="url(#p1)" opacity="0.85" />
    <path d="M162,110 L175,100 L172,94 L156,108 Z" fill="url(#p1)" opacity="0.85" />
  </g>

  <!-- Person 2 - Top Right -->
  <g transform="rotate(72, 150, 150)">
    <circle cx="150" cy="72" r="14" fill="url(#p2)" />
    <path d="M150,86 L138,110 L144,115 L150,100 L156,115 L162,110 Z" fill="url(#p2)" />
    <path d="M138,110 L125,100 L128,94 L144,108 Z" fill="url(#p2)" opacity="0.85" />
    <path d="M162,110 L175,100 L172,94 L156,108 Z" fill="url(#p2)" opacity="0.85" />
  </g>

  <!-- Person 3 - Bottom Right -->
  <g transform="rotate(144, 150, 150)">
    <circle cx="150" cy="72" r="14" fill="url(#p3)" />
    <path d="M150,86 L138,110 L144,115 L150,100 L156,115 L162,110 Z" fill="url(#p3)" />
    <path d="M138,110 L125,100 L128,94 L144,108 Z" fill="url(#p3)" opacity="0.85" />
    <path d="M162,110 L175,100 L172,94 L156,108 Z" fill="url(#p3)" opacity="0.85" />
  </g>

  <!-- Person 4 - Bottom Left -->
  <g transform="rotate(216, 150, 150)">
    <circle cx="150" cy="72" r="14" fill="url(#p4)" />
    <path d="M150,86 L138,110 L144,115 L150,100 L156,115 L162,110 Z" fill="url(#p4)" />
    <path d="M138,110 L125,100 L128,94 L144,108 Z" fill="url(#p4)" opacity="0.85" />
    <path d="M162,110 L175,100 L172,94 L156,108 Z" fill="url(#p4)" opacity="0.85" />
  </g>

  <!-- Person 5 - Top Left -->
  <g transform="rotate(288, 150, 150)">
    <circle cx="150" cy="72" r="14" fill="url(#p5)" />
    <path d="M150,86 L138,110 L144,115 L150,100 L156,115 L162,110 Z" fill="url(#p5)" />
    <path d="M138,110 L125,100 L128,94 L144,108 Z" fill="url(#p5)" opacity="0.85" />
    <path d="M162,110 L175,100 L172,94 L156,108 Z" fill="url(#p5)" opacity="0.85" />
  </g>

  <!-- Center connecting circle -->
  <circle cx="150" cy="150" r="22" fill="none" stroke="#2b6cb0" stroke-width="1.5" opacity="0.3" />
  <circle cx="150" cy="150" r="8" fill="#2b6cb0" opacity="0.15" />

  <!-- Connecting lines from each person to center -->
  <line x1="150" y1="115" x2="150" y2="128" stroke="#2b6cb0" stroke-width="1" opacity="0.2" />
  <line x1="183" y1="126" x2="170" y2="135" stroke="#2b6cb0" stroke-width="1" opacity="0.2" />
  <line x1="170" y1="170" x2="162" y2="160" stroke="#2b6cb0" stroke-width="1" opacity="0.2" />
  <line x1="117" y1="126" x2="130" y2="135" stroke="#2b6cb0" stroke-width="1" opacity="0.2" />
  <line x1="130" y1="170" x2="138" y2="160" stroke="#2b6cb0" stroke-width="1" opacity="0.2" />
</svg>