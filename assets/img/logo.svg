<svg width="420" height="140" viewBox="0 0 420 140" xmlns="http://www.w3.org/2000/svg">
  <style>
    .blue { fill: #2B86B8; font-family: 'Poppins', sans-serif; font-weight: 800; }
    .green { fill: #A6C436; font-family: 'Poppins', sans-serif; font-weight: 800; }
  </style>

  <text x="10" y="80" font-size="64" class="blue">EGOV</text>
  <text x="250" y="80" font-size="64" class="green">-PL</text>

  <!-- ponto destaque -->
