<!--
  PARTIAL: head.html
  Uso: conteúdo do <head> padrão.
  Em pages/*.html, trocar {BASE} por "../" (para subpáginas) ou "" (para index).
  Trocar {TITLE} pelo título da página.
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{TITLE} · Escola de Governo Pedro Leopoldo</title>
<meta
  name="description"
  content="Escola de Governo de Pedro Leopoldo · Capacitação contínua dos servidores públicos municipais em 9 eixos estratégicos."
/>
<link rel="stylesheet" href="{BASE}assets/css/style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<script>
  // Aplica tema antes do render para evitar flash.
  (function () {
    try {
      var stored = localStorage.getItem("egovpl-theme")
      var theme = stored || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
      document.documentElement.setAttribute("data-theme", theme)
    } catch (e) {}
  })()
</script>
